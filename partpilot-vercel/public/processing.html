<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PartPilot — Scanning BOM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script defer src="assets/js/app.js"></script>
</head>
<body data-page="processing">
  <main class="scan-shell">
    <section class="scan-center">
      <div class="scan-title">scanning 12 components...</div>
      <div class="term-box">
        <div class="term-line">$ Parsing BOM structure...</div>
        <div class="term-line">$ Resolving manufacturer part numbers...</div>
        <div class="term-line">$ Querying distributor APIs...</div>
        <div class="term-line">$ Checking lifecycle status...</div>
        <div class="term-line">$ Calculating risk scores...</div>
        <div class="term-line">$ Mapping alternates...</div>
        <div class="term-line">$ Building risk graph...</div>
        <div class="term-line final done">$ Done.</div>
      </div>
      <div class="progress-shell"><div class="progress-bar"></div></div>
    </section>
  </main>
</body>
</html>
